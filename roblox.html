<style>
  /* Force single column layout */
  body {
    background-color: #000 !important;
    color: #fff !important;
  }
  .main-lyt {
    display: block !important;
    max-width: 1400px !important;
    margin: 0 auto !important;
    width: 100% !important;
    padding: 2rem 1.5rem !important;
  }
  .layout-left, .layout-right {
    display: none !important;
    width: 0 !important;
    flex: 0 !important;
    margin: 0 !important;
  }
  .layout-center {
    display: block !important;
    width: 100% !important;
    max-width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  /* Logo Styling */
  .ph-logo-text, .ph-footer-logo-text {
    font-family: 'Baloo 2', 'Open Sans', sans-serif !important;
    font-size: 2.2rem !important;
    font-weight: 800 !important;
    color: #a855f7 !important;
    text-transform: lowercase !important;
    letter-spacing: -0.04em !important;
    line-height: 1 !important;
    display: inline-block !important;
    text-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
  }

  /* Fix card grid alignment and readability */
  .cards-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)) !important;
    gap: 2.5rem !important;
    width: 100% !important;
  }

  .exploit-card-placeholder {
    min-height: 520px !important;
    padding: 2rem !important;
    background: rgba(15, 15, 15, 0.95) !important;
    border: 1px solid rgba(168, 85, 247, 0.2) !important;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5) !important;
    transition: border-color 0.3s ease, box-shadow 0.3s ease !important;
  }

  .exploit-card-placeholder:hover {
    border-color: rgba(168, 85, 247, 0.5) !important;
    box-shadow: 0 0 20px rgba(168, 85, 247, 0.15) !important;
  }

  .ph-title {
    font-size: 1.6rem !important;
    margin-bottom: 0.75rem !important;
    color: #fff !important;
  }

  .ph-title-meta {
    font-size: 0.85rem !important;
    color: #aaa !important;
  }

  /* Fix status row alignment */
  .sts-row {
    margin-bottom: 2rem !important;
    padding: 0.5rem 0 !important;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
  }

  .sts-txt {
    font-size: 1rem !important;
    color: #888 !important;
  }

  /* Hide useless icons if requested */
  .ph-platform-icons i {
    font-size: 1rem !important;
  }
  .sts-txt {
    display: none !important;
  }
</style>
